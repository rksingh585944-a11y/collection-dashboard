<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2333;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --paid: #3fb950; --unpaid: #f85149; --accent: #58a6ff;
    --gold: #d29922; --card-radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .header-left h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .header-left span { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .last-updated { font-size: 12px; color: var(--muted); }
  .live-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(63,185,80,0.15); color: var(--paid); border: 1px solid rgba(63,185,80,0.3); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--paid); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .filters { padding: 14px 28px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  select { background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }

  .main { padding: 24px 28px; }

  /* Section headers */
  .section-title { font-size: 15px; font-weight: 700; color: var(--text); margin: 28px 0 14px; padding-left: 12px; border-left: 3px solid var(--accent); }

  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 18px 20px; position: relative; overflow: hidden; }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .kpi-card.blue::before { background: var(--accent); }
  .kpi-card.green::before { background: var(--paid); }
  .kpi-card.red::before { background: var(--unpaid); }
  .kpi-card.gold::before { background: var(--gold); }
  .kpi-card.purple::before { background: #bc8cff; }
  .kpi-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-value { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .kpi-card.blue .kpi-value { color: var(--accent); }
  .kpi-card.green .kpi-value { color: var(--paid); }
  .kpi-card.red .kpi-value { color: var(--unpaid); }
  .kpi-card.gold .kpi-value { color: var(--gold); }
  .kpi-card.purple .kpi-value { color: #bc8cff; }
  .kpi-sub { font-size: 12px; color: var(--muted); }
  .progress-wrap { margin-top: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--paid), #2ea043); border-radius: 2px; }

  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); padding: 20px; }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .chart-title span { font-size: 11px; color: var(--muted); font-weight: 400; }
  .chart-wrap { position: relative; height: 240px; }
  .chart-wrap.tall { height: 300px; }
  .chart-wrap.medium { height: 260px; }

  .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--card-radius); overflow: hidden; margin-bottom: 16px; }
  .table-header { padding: 14px 20px; font-size: 13px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  table { width: 100%; border-collapse: collapse; }
  th { background: var(--surface2); color: var(--muted); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 9px 16px; border-bottom: 1px solid rgba(48,54,61,0.5); font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge.paid { background: rgba(63,185,80,0.15); color: var(--paid); }
  .badge.unpaid { background: rgba(248,81,73,0.15); color: var(--unpaid); }
  .conv-val { color: var(--gold); font-weight: 600; }

  .loading-state { text-align: center; padding: 80px 20px; color: var(--muted); }
  .loading-state h2 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
  .error-state { text-align: center; padding: 80px 20px; }
  .error-state h2 { font-size: 16px; margin-bottom: 8px; color: var(--unpaid); }
  .error-state p { font-size: 13px; color: var(--muted); line-height: 1.6; }

  @media (max-width: 768px) {
    .main { padding: 16px; } .header { padding: 14px 16px; } .filters { padding: 12px 16px; }
    .charts-grid { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>📊 Collection Dashboard</h1>
    <span id="periodLabel">Loading data...</span>
  </div>
  <div class="header-right">
    <span class="last-updated" id="lastUpdated">–</span>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>
</div>

<div class="filters" id="filtersBar" style="display:none">
  <span class="filter-label">Filter:</span>
  <select id="filterNBFC" onchange="applyFilters()"><option value="ALL">All NBFCs</option></select>
  <select id="filterNewOld" onchange="applyFilters()">
    <option value="ALL">New + Old</option>
    <option value="NEW">New</option>
    <option value="OLD">Old</option>
  </select>
  <select id="filterMonth" onchange="applyFilters()"><option value="ALL">All Months</option></select>
</div>

<div class="main" id="mainContent">
  <div class="loading-state">
    <h2>⏳ Loading Data...</h2>
    <p>Fetching latest collection data from server.</p>
  </div>
</div>

<script>
const DATA_URL = 'data.xlsx';
let rawData = [], filteredData = [], activeCharts = [];

window.addEventListener('load', fetchData);
setInterval(fetchData, 5 * 60 * 1000);

async function fetchData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('File not found: ' + res.status);
    const buffer = await res.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    rawData = XLSX.utils.sheet_to_json(ws).map(row => {
      const clean = {};
      Object.keys(row).forEach(k => clean[k.trim()] = row[k]);
      return clean;
    });
    populateFilters();
    applyFilters();
    document.getElementById('filtersBar').style.display = 'flex';
    document.getElementById('lastUpdated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(err) {
    document.getElementById('mainContent').innerHTML = `<div class="error-state"><h2>⚠️ Data Load Failed</h2><p>${err.message}<br><br>Make sure <b>data.xlsx</b> is uploaded in the GitHub repository.</p></div>`;
    document.getElementById('periodLabel').textContent = 'Error loading data';
  }
}

function parseDate(val) {
  if (!val) return null;
  if (val instanceof Date) return val;
  const d = new Date(val);
  return isNaN(d) ? null : d;
}
function isPaid(r) { return r['Status'] === 'PAID' || r['Status'] === 'BALANCE_AMOUNT'; }
function fmtN(n) {
  if (n >= 1e7) return '₹' + (n/1e7).toFixed(2) + ' Cr';
  if (n >= 1e5) return '₹' + (n/1e5).toFixed(2) + ' L';
  return '₹' + n.toLocaleString('en-IN');
}
function fmtC(n) { return n.toLocaleString('en-IN'); }

function tenureBucket(t) {
  if (t <= 15) return '0-15';
  if (t <= 20) return '16-20';
  if (t <= 25) return '21-25';
  if (t <= 30) return '26-30';
  return '30+';
}
const TENURE_ORDER = ['0-15','16-20','21-25','26-30','30+'];

function populateFilters() {
  const nbfcSel = document.getElementById('filterNBFC');
  nbfcSel.innerHTML = '<option value="ALL">All NBFCs</option>';
  [...new Set(rawData.map(r => r['NBFC']).filter(Boolean))].forEach(n => {
    const o = document.createElement('option'); o.value = n; o.textContent = n; nbfcSel.appendChild(o);
  });
  const monthSel = document.getElementById('filterMonth');
  monthSel.innerHTML = '<option value="ALL">All Months</option>';
  [...new Set(rawData.map(r => {
    const d = parseDate(r['Original due date']);
    return d ? d.toLocaleString('default', { month: 'short', year: 'numeric' }) : null;
  }).filter(Boolean))].forEach(m => {
    const o = document.createElement('option'); o.value = m; o.textContent = m; monthSel.appendChild(o);
  });
}

function applyFilters() {
  const nbfc = document.getElementById('filterNBFC').value;
  const newold = document.getElementById('filterNewOld').value;
  const month = document.getElementById('filterMonth').value;
  filteredData = rawData.filter(r => {
    if (nbfc !== 'ALL' && r['NBFC'] !== nbfc) return false;
    if (newold !== 'ALL' && r['New/Old'] !== newold) return false;
    if (month !== 'ALL') {
      const d = parseDate(r['Original due date']);
      if (!d || d.toLocaleString('default', { month: 'short', year: 'numeric' }) !== month) return false;
    }
    return true;
  });
  renderDashboard();
}

function destroyCharts() { activeCharts.forEach(c => c.destroy()); activeCharts = []; }

const CD = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
  scales: {
    x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: 'rgba(48,54,61,0.5)' } },
    y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: 'rgba(48,54,61,0.5)' } }
  }
};

function mkChart(id, type, data, options) {
  const c = new Chart(document.getElementById(id), { type, data, options });
  activeCharts.push(c); return c;
}

function renderDashboard() {
  destroyCharts();
  const data = filteredData;
  if (!data.length) {
    document.getElementById('mainContent').innerHTML = '<div class="error-state"><h2>🔍 No data for selected filters</h2></div>';
    return;
  }

  // ── METRICS ──
  const total = data.length;
  const paidRows = data.filter(isPaid);
  const paid = paidRows.length;
  const unpaid = total - paid;
  const conversion = (paid / total * 100).toFixed(1);
  const paidAmt = paidRows.reduce((s, r) => s + (parseFloat(r['Collection amount']) || 0), 0);
  const totalDue = data.reduce((s, r) => s + (parseFloat(r['Due Amt on Curr Date']) || 0), 0);

  // Period label
  const dates = data.map(r => parseDate(r['Original due date'])).filter(Boolean);
  if (dates.length) {
    const mn = new Date(Math.min(...dates)), mx = new Date(Math.max(...dates));
    document.getElementById('periodLabel').textContent =
      mn.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + ' – ' +
      mx.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  }

  // ── DAY WISE (Collection date, paid rows) ──
  const dayMap = {};
  paidRows.forEach(r => {
    const d = parseDate(r['Collection date']); if (!d) return;
    const key = d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    if (!dayMap[key]) dayMap[key] = { count:0, amount:0, dateObj:d };
    dayMap[key].count++;
    dayMap[key].amount += parseFloat(r['Collection amount'])||0;
  });
  const dayKeys = Object.keys(dayMap).sort((a,b) => dayMap[a].dateObj - dayMap[b].dateObj);

  // ── DUE DATE WISE ──
  const dueMap = {};
  data.forEach(r => {
    const d = parseDate(r['Original due date']); if (!d) return;
    const key = d.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
    if (!dueMap[key]) dueMap[key] = { total:0, paid:0, dateObj:d };
    dueMap[key].total++;
    if (isPaid(r)) dueMap[key].paid++;
  });
  const dueKeys = Object.keys(dueMap).sort((a,b) => dueMap[a].dateObj - dueMap[b].dateObj);

  // ── TENURE BUCKETS ──
  const tenMap = {};
  TENURE_ORDER.forEach(b => tenMap[b] = { total:0, paid:0 });
  data.forEach(r => {
    const t = parseFloat(r['Tenure (Sanctioned)']); if (isNaN(t)) return;
    const b = tenureBucket(t);
    tenMap[b].total++;
    if (isPaid(r)) tenMap[b].paid++;
  });

  // ── NBFC ──
  const nbfcMap = {};
  data.forEach(r => {
    const n = (r['NBFC']||'Unknown').replace('FINANCIAL SERVICES','').replace('PRIVATE LIMITED','').replace('PVT LTD','').trim();
    if (!nbfcMap[n]) nbfcMap[n] = { total:0, paid:0, amount:0 };
    nbfcMap[n].total++;
    if (isPaid(r)) { nbfcMap[n].paid++; nbfcMap[n].amount += parseFloat(r['Collection amount'])||0; }
  });

  // ── NEW/OLD ──
  const novMap = {};
  data.forEach(r => {
    const k = r['New/Old']||'Unknown';
    if (!novMap[k]) novMap[k] = { total:0, paid:0 };
    novMap[k].total++;
    if (isPaid(r)) novMap[k].paid++;
  });

  // ── TABLE ROWS HELPER ──
  const tRow = (cells) => `<tr>${cells.map(c => `<td>${c}</td>`).join('')}</tr>`;
  const convBadge = v => `<span class="conv-val">${v}%</span>`;
  const paidBadge = v => `<span class="badge paid">${fmtC(v)}</span>`;
  const unpaidBadge = v => `<span class="badge unpaid">${fmtC(v)}</span>`;

  document.getElementById('mainContent').innerHTML = `

    <!-- ══ SUMMARY KPIs ══ -->
    <div class="section-title">Overall Summary</div>
    <div class="kpi-grid">
      <div class="kpi-card blue"><div class="kpi-label">Total Cases</div><div class="kpi-value">${fmtC(total)}</div><div class="kpi-sub">This period</div></div>
      <div class="kpi-card green">
        <div class="kpi-label">Paid (Paid + Bal Amt)</div><div class="kpi-value">${fmtC(paid)}</div>
        <div class="kpi-sub">${fmtN(paidAmt)} collected</div>
        <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${conversion}%"></div></div></div>
      </div>
      <div class="kpi-card red"><div class="kpi-label">Unpaid</div><div class="kpi-value">${fmtC(unpaid)}</div><div class="kpi-sub">${(100-parseFloat(conversion)).toFixed(1)}% of total</div></div>
      <div class="kpi-card gold"><div class="kpi-label">Conversion %</div><div class="kpi-value">${conversion}%</div><div class="kpi-sub">Paid / Total cases</div></div>
      <div class="kpi-card purple"><div class="kpi-label">Total Due</div><div class="kpi-value">${fmtN(totalDue)}</div><div class="kpi-sub">Collected ${fmtN(paidAmt)}</div></div>
    </div>

    <!-- ══ DAY-WISE COLLECTION MOVEMENT ══ -->
    <div class="section-title">Day-wise Collection Movement</div>
    <div class="charts-grid">
      <div class="chart-card full"><div class="chart-title">Cases Paid per Day <span>by Collection Date</span></div><div class="chart-wrap tall"><canvas id="chartDaywise"></canvas></div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Daily Amount <span>₹ Lakhs</span></div><div class="chart-wrap"><canvas id="chartDayAmt"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Paid vs Unpaid <span>Overall split</span></div><div class="chart-wrap"><canvas id="chartPaidUnpaid"></canvas></div></div>
    </div>

    <!-- ══ REPORT 1 — DUE DATE WISE ══ -->
    <div class="section-title">Report 1 — Original Due Date Wise</div>
    <div class="charts-grid">
      <div class="chart-card full"><div class="chart-title">Paid vs Unpaid by Due Date <span>Case count</span></div><div class="chart-wrap medium"><canvas id="chartDueDate"></canvas></div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card full"><div class="chart-title">Conversion % by Due Date</div><div class="chart-wrap"><canvas id="chartDueDateConv"></canvas></div></div>
    </div>
    <div class="table-card">
      <div class="table-header"><span>Due Date Wise Summary</span><span style="color:var(--muted);font-size:12px">${dueKeys.length} dates</span></div>
      <table>
        <thead><tr><th>Due Date</th><th>Total</th><th>Paid</th><th>Unpaid</th><th>Conversion %</th></tr></thead>
        <tbody>
          ${dueKeys.map(k => tRow([
            k,
            fmtC(dueMap[k].total),
            paidBadge(dueMap[k].paid),
            unpaidBadge(dueMap[k].total - dueMap[k].paid),
            convBadge((dueMap[k].paid/dueMap[k].total*100).toFixed(1))
          ])).join('')}
        </tbody>
      </table>
    </div>

    <!-- ══ REPORT 2 — TENURE BUCKET WISE ══ -->
    <div class="section-title">Report 2 — Tenure (Sanctioned) Bucket Wise</div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Paid vs Unpaid by Tenure <span>Case count</span></div><div class="chart-wrap"><canvas id="chartTenure"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Conversion % by Tenure Bucket</div><div class="chart-wrap"><canvas id="chartTenureConv"></canvas></div></div>
    </div>
    <div class="table-card">
      <div class="table-header"><span>Tenure Bucket Wise Summary</span></div>
      <table>
        <thead><tr><th>Tenure Bucket</th><th>Total</th><th>Paid</th><th>Unpaid</th><th>Conversion %</th></tr></thead>
        <tbody>
          ${TENURE_ORDER.map(b => tRow([
            b + ' days',
            fmtC(tenMap[b].total),
            paidBadge(tenMap[b].paid),
            unpaidBadge(tenMap[b].total - tenMap[b].paid),
            convBadge((tenMap[b].paid/tenMap[b].total*100).toFixed(1))
          ])).join('')}
        </tbody>
      </table>
    </div>

    <!-- ══ REPORT 3 — NBFC WISE ══ -->
    <div class="section-title">Report 3 — NBFC Wise</div>
    <div class="charts-grid">
      <div class="chart-card"><div class="chart-title">Paid vs Unpaid by NBFC <span>Case count</span></div><div class="chart-wrap"><canvas id="chartNBFCBar"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">Conversion % by NBFC</div><div class="chart-wrap"><canvas id="chartNBFCConv"></canvas></div></div>
    </div>
    <div class="table-card">
      <div class="table-header"><span>NBFC Wise Summary</span><span style="color:var(--muted);font-size:12px">${Object.keys(nbfcMap).length} NBFCs</span></div>
      <table>
        <thead><tr><th>NBFC</th><th>Total</th><th>Paid</th><th>Unpaid</th><th>Conversion %</th><th>Amount Collected</th></tr></thead>
        <tbody>
          ${Object.entries(nbfcMap).map(([n,v]) => tRow([
            n,
            fmtC(v.total),
            paidBadge(v.paid),
            unpaidBadge(v.total - v.paid),
            convBadge((v.paid/v.total*100).toFixed(1)),
            fmtN(v.amount)
          ])).join('')}
        </tbody>
      </table>
    </div>
  `;

  // ── CHARTS ──

  // Day-wise cases bar
  mkChart('chartDaywise','bar',{
    labels: dayKeys,
    datasets:[{ label:'Cases Paid', data:dayKeys.map(k=>dayMap[k].count), backgroundColor:'rgba(88,166,255,0.7)', borderColor:'#58a6ff', borderWidth:1, borderRadius:3 }]
  },{ ...CD, plugins:{legend:{display:false}} });

  // Daily amount line
  mkChart('chartDayAmt','line',{
    labels: dayKeys,
    datasets:[{ label:'₹ Lakhs', data:dayKeys.map(k=>Math.round(dayMap[k].amount/1e5)), borderColor:'#d29922', backgroundColor:'rgba(210,153,34,0.1)', fill:true, tension:0.4, pointRadius:3, pointBackgroundColor:'#d29922' }]
  },{ ...CD, plugins:{legend:{display:false}} });

  // Paid vs Unpaid donut
  mkChart('chartPaidUnpaid','doughnut',{
    labels:['Paid','Unpaid'],
    datasets:[{ data:[paid,unpaid], backgroundColor:['rgba(63,185,80,0.8)','rgba(248,81,73,0.8)'], borderColor:['#3fb950','#f85149'], borderWidth:2 }]
  },{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{ position:'bottom', labels:{color:'#8b949e',padding:16,font:{size:12}} } } });

  // Due date stacked bar
  mkChart('chartDueDate','bar',{
    labels: dueKeys,
    datasets:[
      { label:'Paid', data:dueKeys.map(k=>dueMap[k].paid), backgroundColor:'rgba(63,185,80,0.8)', borderRadius:2 },
      { label:'Unpaid', data:dueKeys.map(k=>dueMap[k].total-dueMap[k].paid), backgroundColor:'rgba(248,81,73,0.8)', borderRadius:2 }
    ]
  },{ ...CD, scales:{ x:{ stacked:true, ticks:{color:'#8b949e',font:{size:10}}, grid:{color:'rgba(48,54,61,0.5)'} }, y:{ stacked:true, ticks:{color:'#8b949e'}, grid:{color:'rgba(48,54,61,0.5)'} } } });

  // Due date conversion line
  mkChart('chartDueDateConv','line',{
    labels: dueKeys,
    datasets:[{ label:'Conversion %', data:dueKeys.map(k=>(dueMap[k].paid/dueMap[k].total*100).toFixed(1)), borderColor:'#58a6ff', backgroundColor:'rgba(88,166,255,0.1)', fill:true, tension:0.4, pointRadius:4, pointBackgroundColor:'#58a6ff' }]
  },{ ...CD, plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:'#8b949e',font:{size:10}},grid:{color:'rgba(48,54,61,0.5)'}}, y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'rgba(48,54,61,0.5)'},max:100} } });

  // Tenure stacked bar
  mkChart('chartTenure','bar',{
    labels: TENURE_ORDER.map(b=>b+' days'),
    datasets:[
      { label:'Paid', data:TENURE_ORDER.map(b=>tenMap[b].paid), backgroundColor:'rgba(63,185,80,0.8)', borderRadius:4 },
      { label:'Unpaid', data:TENURE_ORDER.map(b=>tenMap[b].total-tenMap[b].paid), backgroundColor:'rgba(248,81,73,0.8)', borderRadius:4 }
    ]
  },{ ...CD });

  // Tenure conversion bar
  mkChart('chartTenureConv','bar',{
    labels: TENURE_ORDER.map(b=>b+' days'),
    datasets:[{ label:'Conversion %', data:TENURE_ORDER.map(b=>(tenMap[b].paid/tenMap[b].total*100).toFixed(1)), backgroundColor:'rgba(210,153,34,0.8)', borderRadius:4 }]
  },{ ...CD, plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:'#8b949e'},grid:{color:'rgba(48,54,61,0.5)'}}, y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'rgba(48,54,61,0.5)'},max:100} } });

  // NBFC stacked bar
  const nbfcNames = Object.keys(nbfcMap);
  mkChart('chartNBFCBar','bar',{
    labels: nbfcNames,
    datasets:[
      { label:'Paid', data:nbfcNames.map(n=>nbfcMap[n].paid), backgroundColor:'rgba(63,185,80,0.8)', borderRadius:4 },
      { label:'Unpaid', data:nbfcNames.map(n=>nbfcMap[n].total-nbfcMap[n].paid), backgroundColor:'rgba(248,81,73,0.8)', borderRadius:4 }
    ]
  },{ ...CD });

  // NBFC conversion horizontal bar
  mkChart('chartNBFCConv','bar',{
    labels: nbfcNames,
    datasets:[{ label:'Conversion %', data:nbfcNames.map(n=>(nbfcMap[n].paid/nbfcMap[n].total*100).toFixed(1)), backgroundColor:['rgba(210,153,34,0.8)','rgba(88,166,255,0.8)','rgba(188,140,255,0.8)'], borderRadius:4 }]
  },{ ...CD, indexAxis:'y', plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'rgba(48,54,61,0.5)'},max:100}, y:{ticks:{color:'#8b949e',font:{size:10}},grid:{display:false}} } });
}
</script>
